<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戦国の輪 — Wheel of the Warring States</title>
  <meta name="description" content="A spin-by-spin survival game set in the warring-states era of feudal Japan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- persistent SVG defs (gradients referenced by the wheel) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f4d78a" />
        <stop offset="0.5" stop-color="#c99a3c" />
        <stop offset="1" stop-color="#8a6417" />
      </linearGradient>
    </defs>
  </svg>

  <div class="app">

    <!-- ================= LEFT: controls ================= -->
    <aside class="col-left">
      <div class="brand">
        <div class="brand-jp">戦国の輪</div>
        <div class="brand-en">Wheel of the<br />Warring States</div>
      </div>
      <button id="btn-new" class="ctl ctl-crimson">始　New Game</button>
      <button id="btn-how" class="ctl ctl-gold">問　How to Play</button>
      <button id="btn-endings" class="ctl">巻　Endings</button>
      <div class="scene-frame">
        <svg id="scene-svg" viewBox="0 0 300 210" aria-label="a scene of your journey, in the old style"></svg>
      </div>
    </aside>

    <!-- ================= CENTER: prompt + wheel ================= -->
    <main class="col-center">
      <h1 id="prompt-title">戦国の輪</h1>
      <div id="prompt-sub">Wheel of the Warring States</div>

      <div class="wheel-wrap">
        <svg id="wheel-svg" viewBox="0 0 300 300" aria-label="fortune wheel"></svg>
        <div class="pointer" aria-hidden="true"></div>
      </div>

      <button id="action-btn" class="action-btn">◈ Begin</button>
    </main>

    <!-- ================= RIGHT: character + journal ================= -->
    <aside class="col-right">

      <section class="panel character">
        <div class="panel-title">Your Character</div>
        <div class="ch-line"><span class="k">Station</span><span id="ch-status" class="v">—</span></div>
        <div class="ch-line"><span class="k">Carrying</span><span id="ch-tool" class="v">—</span></div>
        <div class="ch-line"><span class="k">Purpose</span><span id="ch-quest" class="v">—</span></div>
        <div class="ch-line"><span class="k">Where</span><span id="ch-loc" class="v">—</span></div>
        <div class="ch-line ch-coin"><span class="k">Coin</span><span id="ch-coin" class="v v-coin">—</span></div>

        <div class="stat">
          <div class="stat-head"><span>Health</span><span id="hp-num">—</span></div>
          <div class="track"><div id="hp-fill" class="fill fill-hp"></div></div>
        </div>
        <div class="stat">
          <div class="stat-head"><span>Strength</span><span id="str-num">—</span></div>
          <div class="track"><div id="str-fill" class="fill fill-str"></div></div>
        </div>
        <div class="stat">
          <div class="stat-head"><span>Wisdom</span><span id="wis-num">—</span></div>
          <div class="track"><div id="wis-fill" class="fill fill-wis"></div></div>
        </div>
        <div class="stat">
          <div class="stat-head"><span>Charisma</span><span id="cha-num">—</span></div>
          <div class="track"><div id="cha-fill" class="fill fill-cha"></div></div>
        </div>

        <div class="panel-sub">Companions</div>
        <div id="companions" class="grid grid-comp"></div>
      </section>

      <section class="panel journalwrap">
        <div class="panel-title">The Journal</div>
        <div id="journal" class="journal"></div>
      </section>

      <section class="panel itemswrap">
        <div class="panel-title">Items</div>
        <div id="inventory" class="grid grid-items"></div>
      </section>

    </aside>
  </div>

  <!-- ================= modal ================= -->
  <div id="modal" class="modal">
    <div class="modal-card">
      <h2 id="modal-title">—</h2>
      <div id="modal-body" class="modal-body"></div>
      <button id="modal-btn" class="action-btn">Close</button>
    </div>
  </div>

  <!-- data -->
  <script src="js/data/core.js"></script>
  <script src="js/data/story.js"></script>
  <script src="js/data/encounters.js"></script>
  <script src="js/data/signatures.js"></script>
  <script src="js/data/rests.js"></script>
  <script src="js/data/endings.js"></script>
  <script src="js/data/items.js"></script>
  <script src="js/data/art.js"></script>
  <script src="js/data/predicaments.js"></script>
  <!-- optional cross-device sync (safe no-ops when syncUrl is "") -->
  <script src="js/config.js"></script>
  <script src="js/net/sync.js"></script>

  <!-- engine -->
  <script src="js/engine/rng.js"></script>
  <script src="js/engine/state.js"></script>
  <!-- ui -->
  <script src="js/ui/wheel.js"></script>
  <script src="js/ui/scene.js"></script>
  <script src="js/ui/render.js"></script>
  <!-- controller + boot -->
  <script src="js/engine/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
