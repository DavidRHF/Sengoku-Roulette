# Cloudflare Worker config for the Sengoku sync backend.
# 1) Create the KV namespace:   npx wrangler kv namespace create ENDINGS
#    (older wrangler: npx wrangler kv:namespace create ENDINGS)
# 2) Paste the printed id below, replacing PASTE_YOUR_KV_ID_HERE
# 3) Deploy:                     npx wrangler deploy

name = "sengoku-sync"
main = "worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "ENDINGS", id = "PASTE_YOUR_KV_ID_HERE" }
]
